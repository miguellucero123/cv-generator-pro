version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: cvgen-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: cv-generator
    volumes:
      - mongodb_data:/data/db
      - ./docker/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
      - cvgen-network

  # Backend API
  backend:
    build:
      context: ./cv-generator-backend
      dockerfile: Dockerfile
    container_name: cvgen-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      PORT: 5000
      MONGODB_URI: mongodb://admin:admin123@mongodb:27017/cv-generator?authSource=admin
      JWT_SECRET: docker_jwt_secret_muy_seguro_2024
      JWT_EXPIRE: 7d
      FRONTEND_URL: http://localhost:5173
    depends_on:
      - mongodb
    networks:
      - cvgen-network

  # Frontend (opcional - también puedes usar npm run dev localmente)
  frontend:
    build:
      context: ./metgo3d-cv-generator
      dockerfile: Dockerfile
    container_name: cvgen-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:5000/api
    depends_on:
      - backend
    networks:
      - cvgen-network

volumes:
  mongodb_data:

networks:
  cvgen-network:
    driver: bridge
